name: Deploy to GitHub Pages

# Build the Astro site and publish it to GitHub Pages on every push to master.
# Requires: repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [master]
  workflow_dispatch:

# Least-privilege token scopes needed to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; let a newer run cancel an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/configure-pages@v5

      - run: pnpm build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
